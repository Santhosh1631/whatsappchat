services:
  - type: web
    name: chat-importer-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://your-frontend-domain.vercel.app
      - key: USE_SQLITE_FALLBACK
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: chat-importer-db
          property: connectionString


databases:
  - name: chat-importer-db
    databaseName: chat_importer
    user: chat_importer_user
    plan: free
